<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event History · 단꿈e</title>

<!-- 원티드 산스 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
<link rel="preload" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/static/complete/WantedSans.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/static/complete/WantedSans.min.css" />

<style>
  :root{
    /* ============================================
       🎨 색상 바꾸는 곳은 여기뿐이에요!
       아래 헥스코드(#으로 시작하는 값)만 원하는 색으로 바꾸면
       파일 전체에 자동으로 반영돼요.
       ============================================ */

    /* Brand — 메인 포인트 컬러 (버튼 / 날짜뱃지 / 호버 강조) */
    --orange-100:#f3f3cc;   /* ⬅ 포인트 컬러(연함) : 날짜뱃지 배경 */
    --orange-500:#00b080;   /* ⬅ 포인트 컬러(기본) : 버튼, 카드 호버 테두리, 날짜뱃지 글씨 */
    --orange-600:#DB4B00;   /* ⬅ 포인트 컬러(진함) : 버튼/제목 호버 시 */
    --orange-50:#FFF8F2; --orange-300:#FFC088;   /* (거의 안 씀, 안 건드려도 OK) */

    /* 배경색 */
    --bg-beige:#fbfbe7;     /* ⬅ 페이지 전체 배경색 */

    /* 텍스트 색 (진한 순 → 연한 순) */
    --gray-700:#25282B;     /* ⬅ 제목, 카드 안 이벤트명 (가장 진한 글씨) */
    --gray-500:#75787B;     /* ⬅ 설명 문구, 카운트 텍스트 */
    --gray-400:#9DA0A3;     /* ⬅ 파일명 등 가장 옅은 글씨 */
    --gray-300:#C5C8CB;     /* ⬅ 화살표 아이콘, 버튼 테두리 */
    --gray-200:#2f4858;     /* ⬅ 카드 테두리(기본 상태) */
    --gray-white:#FFFFFF; --gray-50:#F6F9FC; --gray-100:#EDF0F3; --gray-600:#4D5453;  /* (거의 안 씀) */
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg-beige);
    color:var(--gray-700);
    font-family:'Wanted Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:800px;
    margin:0 auto;
    padding:80px 24px 120px;
  }
  header{ margin-bottom:80px; }
  .eyebrow{
    font-size:12px; line-height:18px; font-weight:700;
    letter-spacing:0.06em; text-transform:uppercase;
    color:var(--orange-500);
    margin:0 0 8px;
  }
  h1{
    font-weight:800;
    font-size:clamp(30px, 5vw, 36px);
    line-height:50px;
    margin:0 0 8px;
    color:var(--gray-700);
  }
  .sub{
    font-size:16px; line-height:24px; font-weight:400;
    color:var(--gray-500);
    max-width:52ch;
    margin:0;
  }
  .count-label{
    display:inline-block;
    margin-top:24px;
    font-size:14px; line-height:20px; font-weight:500; color:var(--gray-500);
  }

  .year-group{ margin-bottom:40px; }
  .year-label{
    display:flex; align-items:center; gap:16px;
    margin-bottom:16px;
  }
  .year-label .num{
    font-size:24px; line-height:36px; font-weight:800; color:var(--gray-700);
  }
  .year-label .rule{ flex:1; height:1px; background:var(--gray-200); }
  .year-label .cnt{
    font-size:12px; line-height:18px; font-weight:700; color:var(--gray-400);
  }

  .entry{
    display:flex; align-items:center; gap:16px;
    background:var(--gray-white);
    border:0.5px solid var(--gray-200);
    border-radius:20px;
    padding:16px 20px;
    margin-bottom:8px;
    text-decoration:none;
    color:inherit;
    box-shadow: 0 1px 2px rgba(37,40,43,0.06);
    transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  .entry:hover, .entry:focus-visible{
    border:1.5px solid var(--orange-500);
    box-shadow: 0 2px 6px rgba(37,40,43,0.08);
    transform:translateY(-1px);
    outline:none;
  }
  .entry:hover .title, .entry:focus-visible .title{ color:var(--orange-600); }
  .entry:hover .arrow, .entry:focus-visible .arrow{ color:var(--orange-500); transform:translateX(4px); }

  .stamp{
    flex:none;
    font-size:12px; font-weight:700;
    color:var(--orange-600);
    background:var(--orange-100);
    border-radius:9999px;
    padding:4px 12px;
    white-space:nowrap;
  }
  .body-col{ flex:1; min-width:0; }
  .title{
    font-size:18px; line-height:26px; font-weight:700;
    color:var(--gray-700);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    transition:color .15s ease;
  }
  .file{
    font-size:12px; line-height:18px; font-weight:400;
    color:var(--gray-400);
    margin-top:2px;
  }
  .arrow{
    flex:none;
    font-size:13px; font-weight:700;
    color:var(--gray-300);
    transition:color .15s ease, transform .15s ease;
  }

  .state{
    font-size:14px; line-height:22px; font-weight:500;
    color:var(--gray-500);
    background:var(--gray-white);
    border-radius:20px;
    padding:40px;
    text-align:center;
  }

  footer{
    margin-top:80px;
    font-size:12px; color:var(--gray-400);
  }

  @media (prefers-reduced-motion: reduce){ * { transition:none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Dankkume · Event Archive</p>
    <h1>이벤트 기록 보관</h1>
    <p class="sub">이벤트 히스토리 보기</p>
    <span class="count-label" id="countLabel"></span>
  </header>

  <div id="content"></div>

  <footer>event-history · 단꿈e</footer>
</div>

<script>
  /* ============================================================
     📌 새 이벤트를 추가하려면?
     1) 이벤트 HTML 파일을 저장소 "루트"에 함께 업로드 (폴더 없이 바로)
     2) 아래 EVENTS 배열에 한 줄 추가 (마지막 줄 콤마 잊지 않기!)

     예)
     { date: '2026-08', title: '여름방학 이벤트', file: '2026-08-summer-event.html' },
     ============================================================ */
  const EVENTS = [
    { date: '2026-03', title: '독서 시즌2 오픈 이벤트',     file: '2026-03-독서_시즌2_오픈_이벤트_260318-0331.html' },
    { date: '2026-06', title: '정주연의 초등 수학 오픈 이벤트',  file: '2026-06-수학_정주연T_오픈_이벤트_260617-0717.html' },
    { date: '2026-06', title: '초등 부모 성장 클래스',  file: '2026-06_초등_부모_성장_클래스_260626-0726.html' },
    { date: '2026-04', title: '한능검x단종 이벤트',  file: '2026-04_한능검_단종_이벤트_260408-0510.html' },
    { date: '2026-04', title: '독서 시즌2 특별판 구매인증 이벤트',  file: '2026-04_독서_시즌2_특별판_구매인증_이벤트_260422-0513.html' },
    { date: '2026-06', title: '초등 한국사 첫걸음 오픈 이벤트',  file: '2026-06_초등_한국사_첫걸음_오픈_이벤트_260603-0624.html' },
  ];

  function render(){
    const contentEl = document.getElementById('content');
    const countEl = document.getElementById('countLabel');

    if(EVENTS.length === 0){
      contentEl.innerHTML = '<p class="state">아직 등록된 이벤트가 없어요. EVENTS 배열에 추가해주세요.</p>';
      countEl.textContent = '0건 등록됨';
      return;
    }

    const groups = {};
    EVENTS.forEach(e => {
      const year = (e.date || '').split('-')[0] || '기타';
      groups[year] = groups[year] || [];
      groups[year].push(e);
    });
    const years = Object.keys(groups).sort((a,b) => b.localeCompare(a));

    contentEl.innerHTML = years.map(year => {
      const rows = groups[year]
        .sort((a,b) => b.date.localeCompare(a.date))
        .map(e => {
          const [, mo] = e.date.split('-');
          const stamp = mo ? `${year}.${mo}` : year;
          return `
            <a class="entry" href="${encodeURIComponent(e.file)}" target="_blank" rel="noopener noreferrer">
              <span class="stamp">${stamp}</span>
              <span class="body-col">
                <div class="title">${e.title}</div>
                <div class="file">${e.file}</div>
              </span>
              <span class="arrow">열기 →</span>
            </a>`;
        }).join('');
      return `<section class="year-group">
                <div class="year-label">
                  <span class="num">${year}</span>
                  <span class="rule"></span>
                  <span class="cnt">${groups[year].length}건</span>
                </div>
                ${rows}
              </section>`;
    }).join('');

    countEl.textContent = `총 ${EVENTS.length}건 등록됨`;
  }

  render();
</script>
</body>
</html>
